<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIRLAB Pencemaran Air</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            overflow-x: hidden;
            color: #f8fafc;
        }

        /* BACKGROUND */
        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(15,23,42,0.6), rgba(15,23,42,0.95)), url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: slowZoom 20s infinite alternate;
        }
        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BACK BUTTON */
        .back-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            color: #cbd5e1;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(-5px);
            color: white;
            border-color: rgba(255,255,255,0.3);
        }

        /* TITLE */
        .title {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 25px;
            animation: fadeInDown 1s ease;
        }

        .title h1 {
            font-size: clamp(35px, 5vw, 55px);
            line-height: 1.1;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .title p {
            font-size: 18px;
            color: #94a3b8;
        }

        /* MAIN CARD */
        .main-card {
            width: 100%;
            max-width: 900px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            animation: fadeInUp 1s ease 0.2s forwards;
            opacity: 0;
        }

        .section-title {
            color: #e2e8f0;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            border: 1px solid rgba(255,255,255,0.1);
            padding: 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
            background: rgba(255,255,255,0.05);
            color: #f1f5f9;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            color: white;
        }

        /* TABLE */
        .table-box {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .table-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #38bdf8;
            font-size: 20px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
            border-radius: 15px;
            overflow: hidden;
        }

        th, td {
            padding: 16px;
            text-align: center;
            width: 50%;
        }

        th {
            background: rgba(56, 189, 248, 0.2);
            color: #e0f2fe;
            font-weight: 600;
            font-size: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        td {
            background: rgba(255,255,255,0.02);
            color: #cbd5e1;
            font-size: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        
        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255,255,255,0.05);
        }

        /* RIVER */
        .river {
            width: 100%;
            height: 350px;
            margin-top: 35px;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #0284c7 0%, #0369a1 100%);
            box-shadow: inset 0 20px 50px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }

        /* WATER WAVES */
        .wave {
            position: absolute;
            width: 200%;
            height: 150px;
            background: rgba(255,255,255,0.1);
            border-radius: 40%;
            animation: wave 12s linear infinite;
            filter: blur(4px);
        }

        .wave:nth-child(1) { top: 20px; }
        .wave:nth-child(2) { top: 100px; animation-duration: 18s; animation-direction: reverse; background: rgba(0,0,0,0.1); }

        @keyframes wave {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* FISH */
        .fish {
            position: absolute;
            font-size: 45px;
            animation: swim 20s linear infinite;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            transition: 1s ease;
        }

        .f1 { top: 50px; animation-delay: 0s; }
        .f2 { top: 130px; animation-delay: 4s; }
        .f3 { top: 220px; animation-delay: 8s; }
        .f4 { top: 80px; animation-delay: 12s; }
        .f5 { top: 180px; animation-delay: 16s; }

        @keyframes swim {
            from { left: 110%; }
            to { left: -20%; }
        }

        /* PLANTS */
        .plant {
            position: absolute;
            bottom: -5px;
            font-size: 55px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            transform-origin: bottom;
            animation: sway 4s ease-in-out infinite alternate;
            transition: 1s ease;
        }

        .p1 { left: 8%; animation-delay: 0s; }
        .p2 { left: 28%; animation-delay: 1s; }
        .p3 { left: 48%; animation-delay: 0.5s; }
        .p4 { left: 68%; animation-delay: 1.5s; }
        .p5 { left: 88%; animation-delay: 0.2s; }
        
        @keyframes sway {
            from { transform: rotate(-5deg); }
            to { transform: rotate(5deg); }
        }

        /* INFO */
        .info-box {
            margin-top: 35px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(56, 189, 248, 0.05));
            border-left: 4px solid #38bdf8;
            color: #f8fafc;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.5s;
        }

        /* EFFECTS */
        .polluted {
            background: linear-gradient(180deg, #334155 0%, #0f172a 100%) !important;
            box-shadow: inset 0 20px 50px rgba(0,0,0,0.8);
        }

        .foam {
            background: linear-gradient(180deg, #94a3b8 0%, #475569 100%) !important;
        }

        .green {
            background: linear-gradient(180deg, #166534 0%, #064e3b 100%) !important;
        }

        .plastic {
            background: linear-gradient(180deg, #475569 0%, #1e293b 100%) !important;
        }

        .dead {
            transform: rotate(180deg) translateY(-20px) !important;
            opacity: 0.5;
            filter: grayscale(1) !important;
            animation-play-state: paused;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media(max-width: 600px) {
            .main-card { padding: 25px; }
            .button-group { grid-template-columns: 1fr; }
            .table-box { padding: 15px; }
            th, td { font-size: 14px; padding: 12px; }
        }
    </style>

</head>

<body>
<a href="index.html" class="back-btn">⬅ Kembali ke Menu</a>

<div class="container">

<div class="bg"></div>
<div class="overlay"></div>

<!-- TITLE -->
<div class="title">
    <h1>DAMPAK<br>PENCEMARAN AIR</h1>
    <p>Simulasi Pengaruh Pencemaran terhadap Ekosistem Perairan</p>
</div>

<!-- MAIN -->
<div class="main-card">

    <div class="section-title">
        Pilih Jenis Limbah
    </div>

    <div class="button-group">

        <button class="btn" onclick="deterjen()">
            🧼 Limbah Deterjen
        </button>

        <button class="btn" onclick="pabrik()">
            🏭 Limbah Pabrik
        </button>

        <button class="btn" onclick="plastik()">
            🛍️ Sampah Plastik
        </button>

        <button class="btn" onclick="pestisida()">
            ☠️ Pestisida
        </button>

        <button class="btn" onclick="resetSimulasi()">
            🔄 Reset Simulasi
        </button>

    </div>

    <!-- TABLE -->
    <div class="table-box">

        <h2>Hasil Pengamatan</h2>

        <table>

            <tr>
                <th>Parameter</th>
                <th>Hasil</th>
            </tr>

            <tr>
                <td>pH Air</td>
                <td id="ph">7</td>
            </tr>

            <tr>
                <td>Kadar Oksigen</td>
                <td id="oxygen">Tinggi</td>
            </tr>

            <tr>
                <td>Kondisi Air</td>
                <td id="water">Jernih</td>
            </tr>

            <tr>
                <td>Kondisi Ikan</td>
                <td id="fishStatus">Sehat</td>
            </tr>

        </table>

    </div>

    <!-- RIVER -->
    <div class="river" id="river">

        <div class="wave"></div>
        <div class="wave"></div>

        <!-- FISH -->
        <div class="fish f1">🐟</div>
        <div class="fish f2">🐠</div>
        <div class="fish f3">🐟</div>
        <div class="fish f4">🐠</div>
        <div class="fish f5">🐟</div>

        <!-- PLANTS -->
        <div class="plant p1">🌿</div>
        <div class="plant p2">🌱</div>
        <div class="plant p3">🌿</div>
        <div class="plant p4">🌱</div>
        <div class="plant p5">🌿</div>

    </div>

    <!-- INFO -->
    <div class="info-box" id="info">
        Air masih bersih dan ekosistem perairan normal.
    </div>

</div>

</div>

<script>

const river = document.getElementById("river");
const fishes = document.querySelectorAll(".fish");

function deterjen(){

    river.className = "river foam";

    document.getElementById("ph").innerHTML = "9";
    document.getElementById("oxygen").innerHTML = "Menurun";
    document.getElementById("water").innerHTML = "Berbusa";
    document.getElementById("fishStatus").innerHTML = "Lemas";

    fishes.forEach(fish=>{
        fish.classList.remove("dead");
    });

    document.getElementById("info").innerHTML =
    "Limbah deterjen menyebabkan air berbusa dan kadar oksigen menurun.";

}

function pabrik(){

    river.className = "river polluted";

    document.getElementById("ph").innerHTML = "4";
    document.getElementById("oxygen").innerHTML = "Sangat Rendah";
    document.getElementById("water").innerHTML = "Hitam Pekat";
    document.getElementById("fishStatus").innerHTML = "Banyak Mati";

    fishes.forEach(fish=>{
        fish.classList.add("dead");
    });

    document.getElementById("info").innerHTML =
    "Limbah pabrik menyebabkan pencemaran berat dan kematian ikan.";

}

function plastik(){

    river.className = "river plastic";

    document.getElementById("ph").innerHTML = "7";
    document.getElementById("oxygen").innerHTML = "Menurun";
    document.getElementById("water").innerHTML = "Keruh";
    document.getElementById("fishStatus").innerHTML = "Terganggu";

    fishes.forEach(fish=>{
        fish.classList.remove("dead");
    });

    document.getElementById("info").innerHTML =
    "Sampah plastik mengganggu kehidupan organisme air.";

}

function pestisida(){

    river.className = "river green";

    document.getElementById("ph").innerHTML = "5";
    document.getElementById("oxygen").innerHTML = "Rendah";
    document.getElementById("water").innerHTML = "Hijau";
    document.getElementById("fishStatus").innerHTML = "Keracunan";

    fishes.forEach(fish=>{
        fish.classList.remove("dead");
    });

    document.getElementById("info").innerHTML =
    "Pestisida merusak rantai makanan dan organisme air.";

}

function resetSimulasi(){

    river.className = "river";

    document.getElementById("ph").innerHTML = "7";
    document.getElementById("oxygen").innerHTML = "Tinggi";
    document.getElementById("water").innerHTML = "Jernih";
    document.getElementById("fishStatus").innerHTML = "Sehat";

    fishes.forEach(fish=>{
        fish.classList.remove("dead");
    });

    document.getElementById("info").innerHTML =
    "Air kembali bersih dan ekosistem perairan normal.";

}

</script>

</body>
</html>
