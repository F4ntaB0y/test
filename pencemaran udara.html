<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIRLAB Pencemaran Udara</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#dff4ff;
    overflow-x:hidden;
}

/* BACKGROUND */
body::before{
    content:'';
    position:fixed;
    inset:0;

    background:
    linear-gradient(to bottom,
    rgba(255,255,255,0.2),
    rgba(0,0,0,0.35)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop');

    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* CONTAINER */
.container{
    width:100%;
    min-height:100vh;
    padding:20px;
}

/* TITLE */
.title{
    text-align:center;
    color:white;
    margin-top:20px;
    text-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.title h1{
    font-size:55px;
    font-weight:800;
    line-height:1;
}

.title p{
    margin-top:12px;
    font-size:18px;
}

/* CARD */
.card{
    width:95%;
    margin:25px auto;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:35px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* SECTION */
.section-title{
    color:white;
    font-size:23px;
    font-weight:700;
    margin-bottom:15px;
}

/* BUTTONS */
.buttons{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.btn{
    border:none;
    border-radius:20px;
    padding:18px;
    background:white;
    display:flex;
    align-items:center;
    gap:15px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.btn:hover{
    transform:scale(1.02);
}

.icon{
    width:65px;
    height:65px;
    border-radius:18px;
    background:#e9f7ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:35px;
}

.btn h3{
    color:#003049;
    font-size:20px;
}

.btn p{
    color:#666;
    font-size:14px;
}

/* TABLE */
.table-box{
    margin-top:30px;
    background:white;
    border-radius:25px;
    padding:20px;
}

.table-box h2{
    text-align:center;
    color:#003049;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th{
    background:#0077b6;
    color:white;
    padding:15px;
    width:50%;
}

td{
    border:1px solid #ddd;
    padding:15px;
    text-align:center;
    background:#f8fbff;
}

/* SIMULATION */
.simulation{
    width:100%;
    height:420px;
    margin-top:30px;
    border-radius:30px;
    overflow:hidden;
    position:relative;
    background:
    linear-gradient(to bottom,
    #7dd3fc,
    #dbeafe);
    transition:1s;
}

/* SUN */
.sun{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#ffd60a;
    position:absolute;
    top:25px;
    right:30px;
    box-shadow:0 0 50px #ffd60a;
}

/* CLOUD */
.cloud{
    position:absolute;
    width:120px;
    height:45px;
    background:white;
    border-radius:50px;
    opacity:0.9;
}

.cloud::before{
    content:'';
    position:absolute;
    width:60px;
    height:60px;
    background:white;
    border-radius:50%;
    top:-20px;
    left:10px;
}

.cloud::after{
    content:'';
    position:absolute;
    width:70px;
    height:70px;
    background:white;
    border-radius:50%;
    top:-35px;
    right:8px;
}

.c1{
    top:50px;
    left:-150px;
    animation:cloud 28s linear infinite;
}

.c2{
    top:120px;
    left:-250px;
    animation:cloud 40s linear infinite;
}

@keyframes cloud{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(1600px);
    }

}

/* CITY */
.city{
    position:absolute;
    bottom:100px;
    width:100%;
    height:150px;
    background:
    linear-gradient(to top,
    #444,
    #666);

    clip-path:polygon(
    0% 100%,
    0% 45%,
    10% 55%,
    20% 35%,
    30% 60%,
    40% 30%,
    50% 65%,
    60% 35%,
    70% 55%,
    80% 30%,
    90% 60%,
    100% 45%,
    100% 100%
    );
}

/* FACTORY */
.factory{
    position:absolute;
    bottom:105px;
    left:15px;
    font-size:90px;
}

/* TREE */
.tree{
    position:absolute;
    bottom:105px;
    right:20px;
    font-size:85px;
}

/* ROAD */
.road{
    position:absolute;
    bottom:0;
    width:100%;
    height:100px;
    background:#2f2f2f;
}

/* ROAD LINE */
.line{
    position:absolute;
    top:48px;
    width:200%;
    height:8px;

    background:
    repeating-linear-gradient(
    to right,
    white 0px,
    white 60px,
    transparent 60px,
    transparent 120px
    );

    animation:lineMove 2s linear infinite;
}

@keyframes lineMove{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-120px);
    }

}

/* MOBIL */
.car{
    position:absolute;
    bottom:18px;
    width:120px;
    height:50px;
    background:#ff595e;
    border-radius:18px 18px 10px 10px;
    animation:carMove 9s linear infinite;
}

/* ATAS MOBIL */
.car::before{
    content:'';
    position:absolute;
    width:65px;
    height:30px;
    background:#ff7b7f;
    top:-22px;
    left:22px;
    border-radius:15px 15px 0 0;
}

/* KACA */
.car::after{
    content:'';
    position:absolute;
    width:40px;
    height:18px;
    background:#bde0fe;
    top:-18px;
    left:35px;
    border-radius:8px;
}

/* BAN */
.wheel{
    position:absolute;
    bottom:-12px;
    width:24px;
    height:24px;
    background:#111;
    border-radius:50%;
    border:5px solid #666;
    animation:wheel 1s linear infinite;
}

.w1{
    left:15px;
}

.w2{
    right:15px;
}

@keyframes wheel{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}

/* GERAK MOBIL */
@keyframes carMove{

    0%{
        left:-150px;
    }

    100%{
        left:120%;
    }

}

/* ASAP */
.smoke{
    position:absolute;
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(50,50,50,0.45);
    filter:blur(12px);
}

.s1{
    left:95px;
    bottom:230px;
    animation:smoke 5s infinite;
}

.s2{
    left:140px;
    bottom:300px;
    animation:smoke 5s infinite 1.5s;
}

.s3{
    left:190px;
    bottom:360px;
    animation:smoke 5s infinite 3s;
}

@keyframes smoke{

    0%{
        transform:translateY(0) scale(1);
        opacity:0.6;
    }

    100%{
        transform:translateY(-120px) scale(1.6);
        opacity:0;
    }

}

/* FIRE */
.fire{
    position:absolute;
    bottom:110px;
    left:50%;
    transform:translateX(-50%);
    font-size:95px;
    display:none;
    animation:fireAnim 0.8s infinite alternate;
}

@keyframes fireAnim{

    from{
        transform:translateX(-50%) scale(1);
    }

    to{
        transform:translateX(-50%) scale(1.1);
    }

}

/* INFO */
.info{
    margin-top:25px;
    background:rgba(0,44,66,0.9);
    color:white;
    border-radius:25px;
    padding:24px;
    text-align:center;
    font-size:21px;
    line-height:1.5;
}

/* EFFECT */
.polluted{
    background:
    linear-gradient(to bottom,
    #6c757d,
    #343a40) !important;
}

.firebg{
    background:
    linear-gradient(to bottom,
    #ff7b00,
    #5c1a00) !important;
}

.green{
    background:
    linear-gradient(to bottom,
    #9be15d,
    #00c9a7) !important;
}

/* MOBILE */
@media(max-width:700px){

    .title h1{
        font-size:42px;
    }

    .btn{
        align-items:flex-start;
    }

}

/* BACK BUTTON */
.back-btn{
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    z-index: 100;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.3);
}
.back-btn:hover{
    background: rgba(255,255,255,0.4);
    transform: scale(1.05);
}
</style>
</head>

<body>
<a href="index.html" class="back-btn">⬅ Kembali ke Menu</a>

<div class="container">

<!-- TITLE -->
<div class="title">

    <h1>PENCEMARAN<br>UDARA</h1>

    <p>
        Simulasi Dampak Pencemaran terhadap Lingkungan
    </p>

</div>

<!-- CARD -->
<div class="card">

    <div class="section-title">
        Pilih Jenis Pencemaran
    </div>

    <!-- BUTTONS -->
    <div class="buttons">

        <button class="btn" onclick="kendaraan()">

            <div class="icon">🚗</div>

            <div>
                <h3>Asap Kendaraan</h3>
                <p>Emisi kendaraan bermotor</p>
            </div>

        </button>

        <button class="btn" onclick="pabrik()">

            <div class="icon">🏭</div>

            <div>
                <h3>Asap Pabrik</h3>
                <p>Gas industri mencemari udara</p>
            </div>

        </button>

        <button class="btn" onclick="kebakaran()">

            <div class="icon">🔥</div>

            <div>
                <h3>Kebakaran Hutan</h3>
                <p>Asap tebal akibat kebakaran</p>
            </div>

        </button>

        <button class="btn" onclick="penghijauan()">

            <div class="icon">🌱</div>

            <div>
                <h3>Penghijauan</h3>
                <p>Membantu memperbaiki kualitas udara</p>
            </div>

        </button>

    </div>

    <!-- TABLE -->
    <div class="table-box">

        <h2>Hasil Pengamatan</h2>

        <table>

            <tr>
                <th>Parameter</th>
                <th>Hasil</th>
            </tr>

            <tr>
                <td>Kualitas Udara</td>
                <td id="air">Baik</td>
            </tr>

            <tr>
                <td>Warna Langit</td>
                <td id="langit">Cerah</td>
            </tr>

            <tr>
                <td>Kondisi Manusia</td>
                <td id="manusia">Sehat</td>
            </tr>

            <tr>
                <td>Kondisi Lingkungan</td>
                <td id="lingkungan">Normal</td>
            </tr>

        </table>

    </div>

    <!-- SIMULATION -->
    <div class="simulation" id="simulation">

        <div class="sun"></div>

        <div class="cloud c1"></div>
        <div class="cloud c2"></div>

        <div class="city"></div>

        <div class="factory">🏭</div>

        <div class="tree">🌳</div>

        <!-- ASAP -->
        <div class="smoke s1"></div>
        <div class="smoke s2"></div>
        <div class="smoke s3"></div>

        <!-- API -->
        <div class="fire" id="fire">
            🔥🔥🔥
        </div>

        <!-- JALAN -->
        <div class="road">

            <div class="line"></div>

            <!-- MOBIL -->
            <div class="car">

                <div class="wheel w1"></div>
                <div class="wheel w2"></div>

            </div>

        </div>

    </div>

    <!-- INFO -->
    <div class="info" id="info">

        Udara masih bersih dan aman untuk makhluk hidup.

    </div>

</div>

</div>

<script>

const simulation = document.getElementById("simulation");
const fire = document.getElementById("fire");

function kendaraan(){

    simulation.className = "simulation polluted";

    fire.style.display = "none";

    document.getElementById("air").innerHTML = "Buruk";
    document.getElementById("langit").innerHTML = "Berkabut";
    document.getElementById("manusia").innerHTML = "Sesak Napas";
    document.getElementById("lingkungan").innerHTML = "Tercemar";

    document.getElementById("info").innerHTML =
    "Asap kendaraan meningkatkan polusi udara dan mengganggu kesehatan.";

}

function pabrik(){

    simulation.className = "simulation polluted";

    fire.style.display = "none";

    document.getElementById("air").innerHTML = "Sangat Buruk";
    document.getElementById("langit").innerHTML = "Gelap";
    document.getElementById("manusia").innerHTML = "Gangguan Pernapasan";
    document.getElementById("lingkungan").innerHTML = "Rusak";

    document.getElementById("info").innerHTML =
    "Asap pabrik menghasilkan gas berbahaya yang mencemari udara.";

}

function kebakaran(){

    simulation.className = "simulation firebg";

    fire.style.display = "block";

    document.getElementById("air").innerHTML = "Berbahaya";
    document.getElementById("langit").innerHTML = "Oranye Pekat";
    document.getElementById("manusia").innerHTML = "ISPA";
    document.getElementById("lingkungan").innerHTML = "Terbakar";

    document.getElementById("info").innerHTML =
    "Kebakaran hutan menghasilkan asap tebal yang berbahaya.";

}

function penghijauan(){

    simulation.className = "simulation green";

    fire.style.display = "none";

    document.getElementById("air").innerHTML = "Membaik";
    document.getElementById("langit").innerHTML = "Biru Cerah";
    document.getElementById("manusia").innerHTML = "Lebih Sehat";
    document.getElementById("lingkungan").innerHTML = "Hijau";

    document.getElementById("info").innerHTML =
    "Penghijauan membantu menyerap polusi udara.";

}

</script>

</body>
</html>
